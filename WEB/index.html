<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>comShell v4.9.1 — STILLWATER FOUNDATION</title>
  <link rel="stylesheet" href="terminal.css">
  <script src="stillwater.js" defer></script>
</head>
<body>

<!-- ── operator verification overlay ──────────────────────── -->
<div id="auth-overlay" role="dialog" aria-modal="true" aria-label="Operator verification">
  <div class="auth-box">
    <div class="auth-title">STILLWATER FOUNDATION</div>
    <div class="auth-subtitle">comShell v4.9.1 — operator verification required</div>
    <form id="auth-form" autocomplete="off">
      <label for="auth-input">operator phrase</label>
      <input
        id="auth-input"
        type="password"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="none"
        spellcheck="false"
        aria-label="Operator phrase"
        required
      >
      <button type="submit" id="auth-submit">verify</button>
    </form>
    <div id="auth-status" class="auth-status" aria-live="polite"></div>
  </div>
</div>

<!-- ── boot overlay ──────────────────────────────────────── -->
<div id="boot-overlay" aria-hidden="true" style="display:none">
  <div id="boot-logo">STILLWATER FOUNDATION</div>
  <div id="boot-bar-wrap"><div id="boot-bar"></div></div>
  <div id="boot-status">establishing session…</div>
</div>

<!-- ── terminal ──────────────────────────────────────────── -->
<div id="terminal-wrap" role="main">

  <header id="terminal-header" aria-label="Terminal status bar">
    <span class="title">comShell v4.9.1</span>
    <span class="meta">
      <span id="status-dot" title="server status"></span>
      <span id="server-status-label">connecting</span>
    </span>
    <span class="meta">INTERNAL USE ONLY</span>
  </header>

  <!-- cold-start notice — shown when server is waking up -->
  <div id="cold-warning">
    ⚠ &nbsp;server instance is waking — first command may take up to 30 seconds
  </div>

  <div id="output" aria-live="polite" aria-label="Terminal output" tabindex="0"></div>

  <div id="input-row">
    <span id="prompt-label" aria-hidden="true">stillwater@comShell:~$&nbsp;</span>
    <input
      id="cmd-input"
      type="text"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="none"
      spellcheck="false"
      aria-label="Enter command"
      disabled
    >
  </div>

</div>

<script>
  // ── DOM refs ───────────────────────────────────────────────
  const outputEl    = document.getElementById("output");
  const inputEl     = document.getElementById("cmd-input");
  const overlay     = document.getElementById("boot-overlay");
  const bootBar     = document.getElementById("boot-bar");
  const bootStatus  = document.getElementById("boot-status");
  const statusDot   = document.getElementById("status-dot");
  const statusLabel = document.getElementById("server-status-label");
  const coldWarning = document.getElementById("cold-warning");

  const PROMPT = "stillwater@comShell:~$";
  const history = [];
  let histIdx = -1;
  let serverAlive = false;
  let coldStartShown = false;

  // ── helpers ────────────────────────────────────────────────
  function esc(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function appendLine(text, cls) {
    const el = document.createElement("span");
    el.className = "line " + (cls || "line-output");
    el.textContent = text;
    el.appendChild(document.createTextNode("\n"));
    outputEl.appendChild(el);
  }

  function appendBlank() {
    const el = document.createElement("span");
    el.className = "line-blank";
    outputEl.appendChild(el);
  }

  function scrollBottom() {
    outputEl.scrollTop = outputEl.scrollHeight;
  }

  function setServerStatus(alive) {
    serverAlive = alive;
    statusDot.className = alive ? "" : "offline";
    statusLabel.textContent = alive ? "online" : "standby";
  }

  // ── terminal actions ───────────────────────────────────────
  function printBanner() {
    appendLine(SW.banner(), "line-banner");
    appendBlank();
    scrollBottom();
  }

  function clearTerminal() {
    outputEl.innerHTML = "";
    printBanner();
  }

  function doExit() {
    const msgs = [
      " Session terminated.",
      " Session lowered into archive state.",
      " Session closed; remaining echoes reassigned.",
    ];
    appendLine(msgs[Math.floor(Math.random() * msgs.length)], "line-exit");
    appendLine(` Session ${SW.session().session_id} archived.`, "line-exit");
    appendBlank();
    scrollBottom();
    inputEl.disabled = true;
    inputEl.placeholder = "session closed";
    setServerStatus(false);
  }

  async function runCommand(raw) {
    // echo what was typed
    appendLine(PROMPT + " " + raw, "line-prompt");

    if (!raw.trim()) {
      appendBlank();
      scrollBottom();
      return;
    }

    // local intercepts
    const low = raw.trim().toLowerCase();
    if (low === "clear" || low === "cls") { clearTerminal(); return; }
    if (low === "exit"  || low === "quit") { doExit(); return; }

    // show a "connecting" line if cold start might be happening
    let connectingEl = null;
    const slowTimer = setTimeout(() => {
      connectingEl = document.createElement("span");
      connectingEl.className = "line line-connecting";
      connectingEl.textContent = " …waiting for server node";
      outputEl.appendChild(connectingEl);
      if (!coldStartShown) {
        coldWarning.classList.add("visible");
        coldStartShown = true;
      }
      scrollBottom();
    }, 2500);

    try {
      const result = await SW.run(raw);
      clearTimeout(slowTimer);
      if (connectingEl) connectingEl.remove();
      coldWarning.classList.remove("visible");

      setServerStatus(true);

      if (result === "__CLEAR__") { clearTerminal(); return; }
      if (result === "__EXIT__")  { doExit(); return; }

      if (result && result.trim()) {
        appendLine(result, "line-output");
      }
    } catch (err) {
      clearTimeout(slowTimer);
      if (connectingEl) connectingEl.remove();
      setServerStatus(false);
      appendLine(
        ` Network error: ${err.message}\n The terminal cannot reach the repository node.\n Pattern Integrity has not responded.`,
        "line-error"
      );
    }

    appendBlank();
    scrollBottom();
  }

  // ── input handling ─────────────────────────────────────────
  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      const raw = inputEl.value;
      inputEl.value = "";
      histIdx = -1;
      if (raw.trim()) history.unshift(raw);
      runCommand(raw);
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      if (histIdx < history.length - 1) {
        histIdx++;
        inputEl.value = history[histIdx];
        setTimeout(() => inputEl.setSelectionRange(9999, 9999), 0);
      }
    } else if (e.key === "ArrowDown") {
      e.preventDefault();
      if (histIdx > 0) { histIdx--; inputEl.value = history[histIdx]; }
      else { histIdx = -1; inputEl.value = ""; }
    } else if (e.key === "l" && e.ctrlKey) {
      e.preventDefault();
      clearTerminal();
    }
  });

  // click anywhere → focus input
  document.getElementById("terminal-wrap").addEventListener("click", () => inputEl.focus());

  // ── animated boot sequence ─────────────────────────────────
  const BOOT_STEPS = [
    [10,  "loading corridor index…"],
    [25,  "mounting archive layer…"],
    [42,  "checking pattern integrity…"],
    [58,  "requesting session from node…"],
    [74,  "verifying roster…"],
    [88,  "establishing comShell channel…"],
    [100, "ready."],
  ];

  async function runBoot() {
    overlay.style.display = "";
    overlay.style.opacity = "1";

    for (const [pct, msg] of BOOT_STEPS) {
      bootBar.style.width = pct + "%";
      bootStatus.textContent = msg;
      await new Promise(r => setTimeout(r, pct === 100 ? 300 : 180 + Math.random() * 120));
    }

    overlay.style.opacity = "0";
    await new Promise(r => setTimeout(r, 500));
    overlay.style.display = "none";

    printBanner();
    inputEl.disabled = false;
    inputEl.focus();

    try {
      const res = await fetch(
        (SW.session().api_base || "https://remake-ns80.onrender.com") + "/health",
        { signal: AbortSignal.timeout(6000) }
      );
      setServerStatus(res.ok);
    } catch (_) {
      setServerStatus(false);
    }
  }

  // ── operator-phrase gate (shown before boot) ──────────────
  const authOverlay = document.getElementById("auth-overlay");
  const authForm    = document.getElementById("auth-form");
  const authInput   = document.getElementById("auth-input");
  const authSubmit  = document.getElementById("auth-submit");
  const authStatus  = document.getElementById("auth-status");

  function setAuthStatus(text, cls) {
    authStatus.textContent = text || "";
    authStatus.className = "auth-status" + (cls ? " " + cls : "");
  }

  authForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const phrase = authInput.value;
    if (!phrase) return;

    authSubmit.disabled = true;
    authInput.disabled = true;
    setAuthStatus("verifying…", "pending");

    try {
      const result = await SW.verifyComshell(phrase);
      if (result.ok) {
        setAuthStatus("verification accepted.", "ok");
        await new Promise(r => setTimeout(r, 350));
        authOverlay.style.opacity = "0";
        await new Promise(r => setTimeout(r, 400));
        authOverlay.style.display = "none";
        await runBoot();
      } else {
        setAuthStatus(result.message || "verification failed.", "fail");
        authInput.value = "";
        authInput.disabled = false;
        authSubmit.disabled = false;
        authInput.focus();
      }
    } catch (err) {
      setAuthStatus(`network error: ${err.message}`, "fail");
      authInput.disabled = false;
      authSubmit.disabled = false;
      authInput.focus();
    }
  });

  window.addEventListener("load", async () => {
    SW.warmUp();
    // pre-fetch a session so the HMAC has something to sign against
    try { await SW.initSession(); } catch (_) { /* fall back to local */ }
    authInput.focus();
  });
</script>
</body>
</html>
