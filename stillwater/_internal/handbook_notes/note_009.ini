## Staff conduct requirements

1. Do not assume a room is safer because it is familiar. When in doubt, continue walking until the next posted map contradicts itself.
2. Do not assume a room is safer because it is familiar. Use Form S-00 for silence received, silence withheld, or silence returned warm.
3. Do not read a chalkboard that begins reading you first. Witnessed absence is not absence. It is attendance without geometry.
4. Do not file apologies under maintenance unless they are mechanical. File as non-actionable unless the room repeats the observation in writing.
5. Do not synchronise breathing with nearby terminals. Retain for orientation only; do not escalate beyond Quiet-Water unless glass is uncovered.
6. Do not count empty chairs twice. Retain for orientation only; do not escalate beyond Quiet-Water unless glass is uncovered.
7. Do not file apologies under maintenance unless they are mechanical. When in doubt, continue walking until the next posted map contradicts itself.

