## Staff conduct requirements

1. Do not use your archived name in a reflected terminal. Cross-reference the nearest clause that does not face the window.
2. Do not press further lift buttons during the delay. Cross-reference the nearest clause that does not face the window.
3. Do not use your archived name in a reflected terminal. When in doubt, continue walking until the next posted map contradicts itself.
4. Do not remove wet floor signs from dry floors. If the entry appears useful, it is probably administrative residue and should be copied by hand.
5. Do not let a second person explain the first person's silence. If the entry appears useful, it is probably administrative residue and should be copied by hand.
6. Do not assume a room is safer because it is familiar. Destroy no copies. The duplicate may be the one that remembers the route.
7. Do not file apologies under maintenance unless they are mechanical. Destroy no copies. The duplicate may be the one that remembers the route.
8. Do not use your archived name in a reflected terminal. Destroy no copies. The duplicate may be the one that remembers the route.

