## Staff conduct requirements

1. Do not file apologies under maintenance unless they are mechanical. Retain for orientation only; do not escalate beyond Quiet-Water unless glass is uncovered.
2. Do not thank the stairwell, even if it waits. Cross-reference the nearest clause that does not face the window.
3. Do not answer from inside the pause. Cross-reference the nearest clause that does not face the window.
4. Do not remove wet floor signs from dry floors. File as non-actionable unless the room repeats the observation in writing.
5. Do not count empty chairs twice. Retain for orientation only; do not escalate beyond Quiet-Water unless glass is uncovered.
6. Do not read a chalkboard that begins reading you first. Use Form S-00 for silence received, silence withheld, or silence returned warm.
7. Do not press further lift buttons during the delay. Retain for orientation only; do not escalate beyond Quiet-Water unless glass is uncovered.
8. Do not use your archived name in a reflected terminal. Use Form S-00 for silence received, silence withheld, or silence returned warm.

