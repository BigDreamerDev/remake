## Staff conduct requirements

1. Do not remove wet floor signs from dry floors. If the entry appears useful, it is probably administrative residue and should be copied by hand.
2. Do not read a chalkboard that begins reading you first. Witnessed absence is not absence. It is attendance without geometry.
3. Do not count empty chairs twice. File as non-actionable unless the room repeats the observation in writing.
4. Do not thank the stairwell, even if it waits. Destroy no copies. The duplicate may be the one that remembers the route.
5. Do not thank the stairwell, even if it waits. If the entry appears useful, it is probably administrative residue and should be copied by hand.
6. Do not let a second person explain the first person's silence. File as non-actionable unless the room repeats the observation in writing.
7. Do not assume a room is safer because it is familiar. Destroy no copies. The duplicate may be the one that remembers the route.

