## Staff conduct requirements

1. Do not dry paper that arrived damp around a name. Cross-reference the nearest clause that does not face the window.
2. Do not count empty chairs twice. Retain for orientation only; do not escalate beyond Quiet-Water unless glass is uncovered.
3. Do not press further lift buttons during the delay. Use Form S-00 for silence received, silence withheld, or silence returned warm.
4. Do not synchronise breathing with nearby terminals. When in doubt, continue walking until the next posted map contradicts itself.
5. Do not thank the stairwell, even if it waits. Destroy no copies. The duplicate may be the one that remembers the route.

