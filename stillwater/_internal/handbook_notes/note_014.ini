## Staff conduct requirements

1. Do not let a second person explain the first person's silence. Witnessed absence is not absence. It is attendance without geometry.
2. Do not thank the stairwell, even if it waits. File as non-actionable unless the room repeats the observation in writing.
3. Do not synchronise breathing with nearby terminals. Witnessed absence is not absence. It is attendance without geometry.
4. Do not synchronise breathing with nearby terminals. Destroy no copies. The duplicate may be the one that remembers the route.
