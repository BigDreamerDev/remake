## Staff conduct requirements

1. Do not read a chalkboard that begins reading you first. Cross-reference the nearest clause that does not face the window.
2. Do not thank the stairwell, even if it waits. Use Form S-00 for silence received, silence withheld, or silence returned warm.
3. Do not read a chalkboard that begins reading you first. Retain for orientation only; do not escalate beyond Quiet-Water unless glass is uncovered.
4. Do not file apologies under maintenance unless they are mechanical. Retain for orientation only; do not escalate beyond Quiet-Water unless glass is uncovered.
5. Do not use your archived name in a reflected terminal. Use Form S-00 for silence received, silence withheld, or silence returned warm.
6. Do not let a second person explain the first person's silence. When in doubt, continue walking until the next posted map contradicts itself.

