## Staff conduct requirements

1. Do not press further lift buttons during the delay. Destroy no copies. The duplicate may be the one that remembers the route.
2. Do not assume a room is safer because it is familiar. Retain for orientation only; do not escalate beyond Quiet-Water unless glass is uncovered.
3. Do not count empty chairs twice. Destroy no copies. The duplicate may be the one that remembers the route.
4. Do not read a chalkboard that begins reading you first. Retain for orientation only; do not escalate beyond Quiet-Water unless glass is uncovered.
5. Do not thank the stairwell, even if it waits. When in doubt, continue walking until the next posted map contradicts itself.
6. Do not remove wet floor signs from dry floors. Witnessed absence is not absence. It is attendance without geometry.

