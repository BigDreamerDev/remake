## Staff conduct requirements

1. Do not thank the stairwell, even if it waits. Retain for orientation only; do not escalate beyond Quiet-Water unless glass is uncovered.
2. Do not count empty chairs twice. Cross-reference the nearest clause that does not face the window.
3. Do not thank the stairwell, even if it waits. When in doubt, continue walking until the next posted map contradicts itself.
4. Do not thank the stairwell, even if it waits. Use Form S-00 for silence received, silence withheld, or silence returned warm.
5. Do not read a chalkboard that begins reading you first. If the entry appears useful, it is probably administrative residue and should be copied by hand.
6. Do not count empty chairs twice. When in doubt, continue walking until the next posted map contradicts itself.

