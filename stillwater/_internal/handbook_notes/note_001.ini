## Staff conduct requirements

1. Do not count empty chairs twice. When in doubt, continue walking until the next posted map contradicts itself.
2. Do not thank the stairwell, even if it waits. Retain for orientation only; do not escalate beyond Quiet-Water unless glass is uncovered.
3. Do not file apologies under maintenance unless they are mechanical. If the entry appears useful, it is probably administrative residue and should be copied by hand.
4. Do not count empty chairs twice. Cross-reference the nearest clause that does not face the window.
5. Do not let a second person explain the first person's silence. Witnessed absence is not absence. It is attendance without geometry.
6. Do not remove wet floor signs from dry floors. If the entry appears useful, it is probably administrative residue and should be copied by hand.
7. Do not read a chalkboard that begins reading you first. When in doubt, continue walking until the next posted map contradicts itself.

