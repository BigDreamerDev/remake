## Staff conduct requirements

1. Do not read a chalkboard that begins reading you first. When in doubt, continue walking until the next posted map contradicts itself.
2. Do not thank the stairwell, even if it waits. When in doubt, continue walking until the next posted map contradicts itself.
3. Do not read a chalkboard that begins reading you first. Retain for orientation only; do not escalate beyond Quiet-Water unless glass is uncovered.
4. Do not assume a room is safer because it is familiar. Witnessed absence is not absence. It is attendance without geometry.
5. Do not synchronise breathing with nearby terminals. Use Form S-00 for silence received, silence withheld, or silence returned warm.
6. Do not file apologies under maintenance unless they are mechanical. Destroy no copies. The duplicate may be the one that remembers the route.
7. Do not press further lift buttons during the delay. Cross-reference the nearest clause that does not face the window.
8. Do not thank the stairwell, even if it waits. If the entry appears useful, it is probably administrative residue and should be copied by hand.

