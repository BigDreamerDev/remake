## Staff conduct requirements

1. Do not thank the stairwell, even if it waits. Witnessed absence is not absence. It is attendance without geometry.
2. Do not press further lift buttons during the delay. Witnessed absence is not absence. It is attendance without geometry.
3. Do not assume a room is safer because it is familiar. When in doubt, continue walking until the next posted map contradicts itself.
4. Do not dry paper that arrived damp around a name. Use Form S-00 for silence received, silence withheld, or silence returned warm.
5. Do not synchronise breathing with nearby terminals. Destroy no copies. The duplicate may be the one that remembers the route.
6. Do not press further lift buttons during the delay. File as non-actionable unless the room repeats the observation in writing.

