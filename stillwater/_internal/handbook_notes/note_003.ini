## Staff conduct requirements

1. Do not press further lift buttons during the delay. Cross-reference the nearest clause that does not face the window.
2. Do not count empty chairs twice. File as non-actionable unless the room repeats the observation in writing.
3. Do not dry paper that arrived damp around a name. Retain for orientation only; do not escalate beyond Quiet-Water unless glass is uncovered.
4. Do not thank the stairwell, even if it waits. File as non-actionable unless the room repeats the observation in writing.
5. Do not synchronise breathing with nearby terminals. When in doubt, continue walking until the next posted map contradicts itself.
6. Do not press further lift buttons during the delay. Cross-reference the nearest clause that does not face the window.

