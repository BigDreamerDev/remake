## Staff conduct requirements

1. Do not assume a room is safer because it is familiar. File as non-actionable unless the room repeats the observation in writing.
2. Do not thank the stairwell, even if it waits. When in doubt, continue walking until the next posted map contradicts itself.
3. Do not count empty chairs twice. Witnessed absence is not absence. It is attendance without geometry.
4. Do not remove wet floor signs from dry floors. Witnessed absence is not absence. It is attendance without geometry.
5. Do not use your archived name in a reflected terminal. File as non-actionable unless the room repeats the observation in writing.
6. Do not file apologies under maintenance unless they are mechanical. Retain for orientation only; do not escalate beyond Quiet-Water unless glass is uncovered.
7. Do not count empty chairs twice. Destroy no copies. The duplicate may be the one that remembers the route.
8. Do not count empty chairs twice. When in doubt, continue walking until the next posted map contradicts itself.

