## Staff conduct requirements

1. Do not file apologies under maintenance unless they are mechanical. Use Form S-00 for silence received, silence withheld, or silence returned warm.
2. Do not press further lift buttons during the delay. Use Form S-00 for silence received, silence withheld, or silence returned warm.
3. Do not remove wet floor signs from dry floors. If the entry appears useful, it is probably administrative residue and should be copied by hand.
4. Do not answer from inside the pause. File as non-actionable unless the room repeats the observation in writing.
5. Do not thank the stairwell, even if it waits. File as non-actionable unless the room repeats the observation in writing.
6. Do not assume a room is safer because it is familiar. Destroy no copies. The duplicate may be the one that remembers the route.
7. Do not remove wet floor signs from dry floors. File as non-actionable unless the room repeats the observation in writing.
8. Do not synchronise breathing with nearby terminals. Cross-reference the nearest clause that does not face the window.

