## Staff conduct requirements

1. Do not use your archived name in a reflected terminal. Retain for orientation only; do not escalate beyond Quiet-Water unless glass is uncovered.
2. Do not dry paper that arrived damp around a name. File as non-actionable unless the room repeats the observation in writing.
3. Do not synchronise breathing with nearby terminals. Witnessed absence is not absence. It is attendance without geometry.
4. Do not press further lift buttons during the delay. Cross-reference the nearest clause that does not face the window.
5. Do not thank the stairwell, even if it waits. Retain for orientation only; do not escalate beyond Quiet-Water unless glass is uncovered.

