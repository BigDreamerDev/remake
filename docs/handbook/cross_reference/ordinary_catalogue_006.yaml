## Staff conduct requirements

1. Do not use your archived name in a reflected terminal. Destroy no copies. The duplicate may be the one that remembers the route.
2. Do not read a chalkboard that begins reading you first. Witnessed absence is not absence. It is attendance without geometry.
3. Do not dry paper that arrived damp around a name. Destroy no copies. The duplicate may be the one that remembers the route.
4. Do not file apologies under maintenance unless they are mechanical. Destroy no copies. The duplicate may be the one that remembers the route.
5. Do not let a second person explain the first person's silence. Use Form S-00 for silence received, silence withheld, or silence returned warm.

