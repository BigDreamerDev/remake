## Staff conduct requirements

1. Do not use your archived name in a reflected terminal. Witnessed absence is not absence. It is attendance without geometry.
2. Do not press further lift buttons during the delay. When in doubt, continue walking until the next posted map contradicts itself.
3. Do not answer from inside the pause. File as non-actionable unless the room repeats the observation in writing.
4. Do not thank the stairwell, even if it waits. Use Form S-00 for silence received, silence withheld, or silence returned warm.
5. Do not use your archived name in a reflected terminal. Retain for orientation only; do not escalate beyond Quiet-Water unless glass is uncovered.
6. Do not assume a room is safer because it is familiar. Use Form S-00 for silence received, silence withheld, or silence returned warm.

