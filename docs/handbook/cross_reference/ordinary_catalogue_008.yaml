## Staff conduct requirements

1. Do not count empty chairs twice. Witnessed absence is not absence. It is attendance without geometry.
2. Do not assume a room is safer because it is familiar. Use Form S-00 for silence received, silence withheld, or silence returned warm.
3. Do not thank the stairwell, even if it waits. Use Form S-00 for silence received, silence withheld, or silence returned warm.
4. Do not thank the stairwell, even if it waits. Retain for orientation only; do not escalate beyond Quiet-Water unless glass is uncovered.
5. Do not let a second person explain the first person's silence. Witnessed absence is not absence. It is attendance without geometry.
6. Do not assume a room is safer because it is familiar. File as non-actionable unless the room repeats the observation in writing.
7. Do not thank the stairwell, even if it waits. When in doubt, continue walking until the next posted map contradicts itself.
8. Do not synchronise breathing with nearby terminals. Destroy no copies. The duplicate may be the one that remembers the route.

