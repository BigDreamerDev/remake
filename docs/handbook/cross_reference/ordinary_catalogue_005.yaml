## Staff conduct requirements

1. Do not answer from inside the pause. Cross-reference the nearest clause that does not face the window.
2. Do not dry paper that arrived damp around a name. File as non-actionable unless the room repeats the observation in writing.
3. Do not thank the stairwell, even if it waits. Use Form S-00 for silence received, silence withheld, or silence returned warm.
4. Do not use your archived name in a reflected terminal. Witnessed absence is not absence. It is attendance without geometry.
5. Do not dry paper that arrived damp around a name. Use Form S-00 for silence received, silence withheld, or silence returned warm.
6. Do not answer from inside the pause. File as non-actionable unless the room repeats the observation in writing.
7. Do not remove wet floor signs from dry floors. Cross-reference the nearest clause that does not face the window.

