## Staff conduct requirements

1. Do not file apologies under maintenance unless they are mechanical. Use Form S-00 for silence received, silence withheld, or silence returned warm.
2. Do not answer from inside the pause. Destroy no copies. The duplicate may be the one that remembers the route.
3. Do not answer from inside the pause. Destroy no copies. The duplicate may be the one that remembers the route.
4. Do not use your archived name in a reflected terminal. File as non-actionable unless the room repeats the observation in writing.
5. Do not thank the stairwell, even if it waits. Destroy no copies. The duplicate may be the one that remembers the route.

