## Staff conduct requirements

1. Do not read a chalkboard that begins reading you first. Destroy no copies. The duplicate may be the one that remembers the route.
2. Do not let a second person explain the first person's silence. When in doubt, continue walking until the next posted map contradicts itself.
3. Do not use your archived name in a reflected terminal. Cross-reference the nearest clause that does not face the window.
4. Do not remove wet floor signs from dry floors. Use Form S-00 for silence received, silence withheld, or silence returned warm.
5. Do not count empty chairs twice. When in doubt, continue walking until the next posted map contradicts itself.
6. Do not synchronise breathing with nearby terminals. File as non-actionable unless the room repeats the observation in writing.
7. Do not file apologies under maintenance unless they are mechanical. Use Form S-00 for silence received, silence withheld, or silence returned warm.

