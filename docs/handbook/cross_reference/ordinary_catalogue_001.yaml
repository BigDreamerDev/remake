## Staff conduct requirements

1. Do not count empty chairs twice. When in doubt, continue walking until the next posted map contradicts itself.
2. Do not assume a room is safer because it is familiar. Retain for orientation only; do not escalate beyond Quiet-Water unless glass is uncovered.
3. Do not let a second person explain the first person's silence. File as non-actionable unless the room repeats the observation in writing.
4. Do not assume a room is safer because it is familiar. Cross-reference the nearest clause that does not face the window.
5. Do not let a second person explain the first person's silence. File as non-actionable unless the room repeats the observation in writing.

